<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON CALCULATOR // SYSTEM v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00f5ff;
            --neon-pink: #ff00ff;
            --neon-purple: #b026ff;
            --neon-green: #39ff14;
            --neon-red: #ff073a;
            --neon-yellow: #ffff00;
            --dark-bg: #050508;
            --panel-bg: rgba(10, 10, 20, 0.85);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 245, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 0, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(176, 38, 255, 0.05) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 500px;
            transform-style: preserve-3d;
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }

        @keyframes bgPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--neon-cyan);
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.6;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 10;
        }

        .cyber-card {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 40px rgba(0, 245, 255, 0.1),
                inset 0 0 40px rgba(0, 245, 255, 0.02);
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.8s ease-out;
        }

        .cyber-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-pink), transparent);
            animation: borderGlow 3s linear infinite;
        }

        .cyber-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-pink), var(--neon-cyan), transparent);
            animation: borderGlow 3s linear infinite reverse;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes borderGlow {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* Corner Decorations */
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid var(--neon-cyan);
            opacity: 0.6;
        }

        .corner-tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .corner-tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .corner-br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        /* Title */
        .cyber-title {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
            position: relative;
        }

        .cyber-subtitle {
            text-align: center;
            color: rgba(0, 245, 255, 0.6);
            font-size: 11px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-family: 'Orbitron', monospace;
        }

        .cyber-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            margin: 10px auto 0;
        }

        /* Scan Line Effect */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 245, 255, 0.3);
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-label {
            display: block;
            color: var(--neon-cyan);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .cyber-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            outline: none;
        }

        .cyber-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.2), inset 0 0 20px rgba(0, 245, 255, 0.05);
            background: rgba(0, 0, 0, 0.6);
        }

        .cyber-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* Glitch Text Effect */
        .glitch {
            position: relative;
        }

        /* Buttons */
        .cyber-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            border-radius: 8px;
            margin-top: 10px;
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .cyber-btn:hover::before {
            left: 100%;
        }

        .cyber-btn:hover {
            background: rgba(0, 245, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .cyber-btn:active {
            transform: scale(0.98);
        }

        .cyber-btn.primary {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.15), rgba(176, 38, 255, 0.15));
        }

        .cyber-btn.secondary {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }

        .cyber-btn.secondary:hover {
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        /* Toggle Text */
        .toggle-section {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }

        .toggle-section a {
            color: var(--neon-cyan);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }

        .toggle-section a:hover {
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .toggle-section a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--neon-cyan);
            transition: width 0.3s;
        }

        .toggle-section a:hover::after {
            width: 100%;
        }

        /* Error Messages */
        .error-msg {
            color: var(--neon-red);
            font-size: 12px;
            margin-top: 5px;
            display: none;
            text-shadow: 0 0 5px rgba(255, 7, 58, 0.5);
            padding-left: 5px;
            border-left: 2px solid var(--neon-red);
        }

        .error-msg.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        /* Success Messages */
        .success-msg {
            color: var(--neon-green);
            font-size: 12px;
            margin-top: 5px;
            display: none;
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
        }

        /* ============ CALCULATOR STYLES ============ */
        .calc-container {
            display: none;
            width: 400px;
        }

        .calc-container.show {
            display: block;
            animation: cardAppear 0.6s ease-out;
        }

        /* Header */
        .calc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 245, 255, 0.2);
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 20px;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .user-avatar::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: avatarShine 3s infinite;
        }

        @keyframes avatarShine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .user-info-text {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            color: var(--neon-cyan);
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .user-status {
            color: var(--neon-green);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .logout-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 7, 58, 0.1);
            box-shadow: 0 0 15px rgba(255, 7, 58, 0.3);
        }

        /* Calculator Screen */
        .calc-screen {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 245, 255, 0.05);
        }

        .calc-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            opacity: 0.5;
        }

        .calc-history {
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            color: rgba(0, 245, 255, 0.5);
            min-height: 18px;
            text-align: right;
            letter-spacing: 1px;
            word-break: break-all;
        }

        .calc-result {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            color: var(--neon-cyan);
            text-align: right;
            margin-top: 8px;
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
            word-break: break-all;
            min-height: 40px;
            letter-spacing: 2px;
        }

        .calc-result.error {
            color: var(--neon-red);
            text-shadow: 0 0 20px rgba(255, 7, 58, 0.5);
        }

        /* Calculator Buttons Grid */
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .calc-btn {
            padding: 18px 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 245, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }

        .calc-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.3), transparent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .calc-btn:hover::before {
            width: 150%;
            height: 150%;
        }

        .calc-btn:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
            transform: translateY(-2px);
        }

        .calc-btn:active {
            transform: translateY(0) scale(0.95);
        }

        .calc-btn.number {
            color: rgba(255, 255, 255, 0.9);
        }

        .calc-btn.number:hover {
            color: #fff;
        }

        .calc-btn.operator {
            border-color: rgba(0, 245, 255, 0.3);
            color: var(--neon-cyan);
            font-weight: 700;
        }

        .calc-btn.operator:hover {
            background: rgba(0, 245, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .calc-btn.equals {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(176, 38, 255, 0.2));
            border-color: var(--neon-cyan);
            color: #fff;
            grid-column: span 2;
            font-weight: 700;
        }

        .calc-btn.equals:hover {
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.4);
            text-shadow: 0 0 10px #fff;
        }

        .calc-btn.clear {
            border-color: rgba(255, 7, 58, 0.3);
            color: var(--neon-red);
        }

        .calc-btn.clear:hover {
            background: rgba(255, 7, 58, 0.1);
            box-shadow: 0 0 20px rgba(255, 7, 58, 0.3);
        }

        .calc-btn.zero {
            grid-column: span 2;
        }

        .calc-btn.delete {
            border-color: rgba(255, 165, 0, 0.3);
            color: #ffa500;
        }

        .calc-btn.delete:hover {
            background: rgba(255, 165, 0, 0.1);
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.3);
        }

        /* Notification */
        .cyber-toast {
            position: fixed;
            top: 30px;
            right: -400px;
